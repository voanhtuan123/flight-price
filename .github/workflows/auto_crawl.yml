name: Bi-Weekly Flight Crawl

on:
  schedule:
    # Runs every other Thursday at 13:00 UTC (06:00 MST - Calgary timezone) (bi-weekly)
    - cron: "0 13 * * 4"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Only run on odd weeks (bi-weekly cadence)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && (github.run_number % 2 == 1))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight crawler
        env:
          AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.main

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Flight crawl failed on $(date)" 
          # Optional: add a curl call to a Slack webhook or email here